# Base installs Argo CD control-plane resources only (chart + shared values).
# App resources (ApplicationSet/Application) are layered by overlays via `apps/`.
#
# Build: kubectl kustomize --enable-helm base   (from repo root)
# Chart: https://artifacthub.io/packages/helm/argo/argo-cd
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.4.17
    releaseName: argocd
    namespace: argocd
    includeCRDs: true
    valuesFile: values.yaml
