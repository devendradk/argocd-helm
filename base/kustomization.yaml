# Reference build: shared values only. Prefer building overlays/test or overlays/prod.
# Build: kubectl kustomize --enable-helm base   (from repo root)
#
# Chart: https://artifacthub.io/packages/helm/argo/argo-cd
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - applicationset-lfs256.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.4.17
    releaseName: argocd
    namespace: argocd
    includeCRDs: true
    valuesFile: values.yaml
