# One-time bootstrap: point Argo CD at this Git repo after a fresh install.
#
# Prerequisite (same on every new cluster): install from this repository with README “Install” so `argocd-cm` is
# created with `kustomize.buildOptions: --enable-helm` from `base/values.yaml`. That is what lets the repo-server
# build Kustomize+Helm (`helmCharts` in kustomization.yaml) when syncing from Git—no separate patch or script.
#
# 1. Push to https://github.com/devendradk/argocd-helm (branch main).
# 2. First install Argo CD core from a *bootstrap* overlay (no app resources in first apply):
#      kubectl kustomize --enable-helm overlays/prod-bootstrap | kubectl apply --server-side -f -
#    (or overlays/test-bootstrap), then wait for rollouts (see README).
# 3. kubectl apply -f bootstrap/root-application.yaml
#
# `spec.source.path` should point to the steady-state overlay (e.g. overlays/prod or overlays/test).
#
# Do NOT list this file under base/kustomization.yaml resources (avoids self-recursion).
#
# After step 3, platform changes flow from Git (push + sync), not from kubectl on each edit.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devendradk/argocd-helm.git
    targetRevision: main
    path: overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
