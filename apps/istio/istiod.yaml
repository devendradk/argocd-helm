apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-istiod-1-29-1-management
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-1-29-1-istio-system
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
        - .webhooks[]?.failurePolicy
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: istiod
      targetRevision: 1.29.1
      helm:
        releaseName: istiod-1-29-1
        valueFiles:
          - $values/clusters/management/1.29.1/istiod/values.yaml
    - repoURL: https://github.com/devendradk/istio-helm-values.git
      targetRevision: main
      ref: values
