# Ambient mesh only: enable when using Istio ambient profile.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ztunnel-management
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: ztunnel
      targetRevision: 1.29.1
      helm:
        releaseName: istio-ztunnel
        values: |
          caAddress: istiod-1-29-1.istio-system.svc:15012
          xdsAddress: istiod-1-29-1.istio-system.svc:15012
          global:
            platform: gke
            priorityClassName: ""
          priorityClassName: ""
        valueFiles:
          - $values/clusters/management/1.29.1/ztunnel/values.yaml
    - repoURL: https://github.com/devendradk/istio-helm-values.git
      targetRevision: main
      ref: values
